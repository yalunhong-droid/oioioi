<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Briscola Arena</title>

<style>

.bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.35;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 50% 30%, #1f3b73 0%, #0f172a 40%, #05070f 100%);
    color: #eee;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 42px;
    color: #f1c40f;
    text-shadow: 0 0 15px rgba(241,196,15,0.7);
}

h2 {
    text-align: center;
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
    margin-top: 40px;
}

.arena-section {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.match {
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-left: 4px solid rgba(0, 212, 255, 0.8);
    border-radius: 14px;
    padding: 16px 26px;
    min-width: 190px;
    text-align: center;
    color: #eaf6ff;
    position: relative;
    overflow: hidden;
}

.vs {
    color: #aaa;
    margin: 5px 0;
}

.group { border-left-color: #3498db; }
.quarter { border-left-color: #9b59b6; }
.semi { border-left-color: #e67e22; }

/* 决赛卡牌 */
.final {
    position: relative;
    overflow: hidden;
    border-left-color: #f1c40f;
    font-weight: bold;
    box-shadow: 0 0 40px rgba(241,196,15,0.6);
    display: inline-block;
    font-size: 20px;
    padding: 25px 40px;
}

.final-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.55;
}

.final-content {
    position: relative;
    z-index: 2;
}

.final-arena {
    text-align: center;
    margin-top: 50px;
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
    <source src="Storm clouds.mp4">
</video>

<h1>🏆 BRISCOLA ARENA</h1>

<h2>Gironi</h2>
<div class="arena-section">
    <div class="match group">A1<div class="vs">VS</div>A2</div>
    <div class="match group">A3<div class="vs">VS</div>A4</div>

    <div class="match group">B1<div class="vs">VS</div>B2</div>
    <div class="match group">B3<div class="vs">VS</div>B4</div>

    <div class="match group">C1<div class="vs">VS</div>C2</div>
    <div class="match group">C3<div class="vs">VS</div>C4</div>

    <div class="match group">D1<div class="vs">VS</div>D2</div>
    <div class="match group">D3<div class="vs">VS</div>D4</div>
</div>

<h2>Quarti di Finale</h2>
<div class="arena-section">
    <div class="match quarter">1A<div class="vs">VS</div>2B</div>
    <div class="match quarter">1B<div class="vs">VS</div>2A</div>
    <div class="match quarter">1C<div class="vs">VS</div>2D</div>
    <div class="match quarter">1D<div class="vs">VS</div>2C</div>
</div>

<h2>Semifinali</h2>
<div class="arena-section">
    <div class="match semi">Vincente Q1<div class="vs">VS</div>Vincente Q3</div>
    <div class="match semi">Vincente Q2<div class="vs">VS</div>Vincente Q4</div>
</div>

<div class="final-arena">

    <div class="match final">

        <video autoplay muted loop playsinline class="final-video">
            <source src="Jinitaimei.mp4">
        </video>

        <div class="final-content">
            🏆 Vincente S1
            <div class="vs">VS</div>
            Vincente S2
        </div>

    </div>

</div>

</body>
</html>
