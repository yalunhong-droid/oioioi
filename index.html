<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Briscola Arena</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
    color: #eee;
    padding: 20px;
    position: relative;
    z-index: 1;
    animation: screenFlash 5s infinite;
}

.lightning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.bolt {
    position: absolute;
    width: 2px;
    height: 120%;
    background: linear-gradient(white, #00d4ff, transparent);
    opacity: 0;
    filter: blur(1px);
    animation: flash 4s infinite;
}

.bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.bolt:nth-child(2) { left: 45%; animation-delay: 1.5s; }
.bolt:nth-child(3) { left: 75%; animation-delay: 2.8s; }

@keyframes flash {
    0%   { opacity: 0; transform: scaleY(0); }
    5%   { opacity: 1; transform: scaleY(1); }
    8%   { opacity: 0.4; }
    12%  { opacity: 1; }
    18%  { opacity: 0; }
    100% { opacity: 0; }
}

@keyframes screenFlash {
    0%, 100% { background-color: rgba(255,255,255,0); }
    4% { background-color: rgba(255,255,255,0.06); }
    8% { background-color: rgba(0,212,255,0.05); }
}

h1 {
    text-align: center;
    font-size: 42px;
    color: #f1c40f;
    text-shadow: 0 0 15px rgba(241,196,15,0.7);
    margin-bottom: 40px;
}

h2 {
    text-align: center;
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
    margin-top: 40px;
}

.arena-section {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.match {
    background: linear-gradient(145deg, #1f1f2e, #2c2c3e);
    border: 1px solid #444;
    border-radius: 12px;
    padding: 15px 25px;
    min-width: 180px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
    transition: 0.3s;
    position: relative;
    z-index: 2;
}

.match:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,212,255,0.8);
}

.vs {
    color: #888;
    margin: 5px 0;
}

.group { border-left: 5px solid #3498db; }
.quarter { border-left: 5px solid #9b59b6; }
.semi { border-left: 5px solid #e67e22; }

.final {
    border-left: 5px solid #f1c40f;
    background: linear-gradient(145deg, #3a2c00, #1f1600);
    font-weight: bold;
}

.final-arena {
    text-align: center;
    margin-top: 40px;
}

.final-arena .match {
    display: inline-block;
    font-size: 20px;
    padding: 25px 40px;
    box-shadow: 0 0 35px rgba(241,196,15,0.9);
}
</style>
</head>

<body>

<div class="lightning">
    <div class="bolt"></div>
    <div class="bolt"></div>
    <div class="bolt"></div>
</div>

<h1>🏆 BRISCOLA ARENA</h1>

<h2>Gironi</h2>
<div class="arena-section">
    <div class="match group">A1<div class="vs">VS</div>A2</div>
    <div class="match group">A3<div class="vs">VS</div>A4</div>

    <div class="match group">B1<div class="vs">VS</div>B2</div>
    <div class="match group">B3<div class="vs">VS</div>B4</div>

    <div class="match group">C1<div class="vs">VS</div>C2</div>
    <div class="match group">C3<div class="vs">VS</div>C4</div>

    <div class="match group">D1<div class="vs">VS</div>D2</div>
    <div class="match group">D3<div class="vs">VS</div>D4</div>
</div>

<h2>Quarti di Finale</h2>
<div class="arena-section">
    <div class="match quarter">1A<div class="vs">VS</div>2B</div>
    <div class="match quarter">1B<div class="vs">VS</div>2A</div>
    <div class="match quarter">1C<div class="vs">VS</div>2D</div>
    <div class="match quarter">1D<div class="vs">VS</div>2C</div>
</div>

<h2>Semifinali</h2>
<div class="arena-section">
    <div class="match semi">Vincente Q1<div class="vs">VS</div>Vincente Q3</div>
    <div class="match semi">Vincente Q2<div class="vs">VS</div>Vincente Q4</div>
</div>

<div class="final-arena">
    <h2>FINAL ARENA</h2>
    <div class="match final">
        🏆 Vincente S1
        <div class="vs">VS</div>
        Vincente S2
    </div>
</div>

</body>
</html>
