<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Briscola Arena</title>

<style>

/* 🎬 背景视频 */
.bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;

    z-index: -1;
    opacity: 0.35; /* 控制清晰度 */
}

/* 页面基础 */
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 50% 30%, #1f3b73 0%, #0f172a 40%, #05070f 100%);
    color: #eee;
    padding: 20px;
}

/* 标题 */
h1 {
    text-align: center;
    font-size: 42px;
    color: #f1c40f;
    text-shadow: 0 0 15px rgba(241,196,15,0.7);
    margin-bottom: 40px;
    letter-spacing: 2px;
}

h2 {
    text-align: center;
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
    margin-top: 40px;
}

/* 布局 */
.arena-section {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

/* 卡片 */
.match {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px 25px;
    min-width: 180px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
    transition: 0.3s;
    position: relative;
    z-index: 1;
}

.match:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,212,255,0.8);
}

.vs {
    color: #aaa;
    margin: 5px 0;
}

/* 阶段颜色 */
.group { border-left: 5px solid #3498db; }
.quarter { border-left: 5px solid #9b59b6; }
.semi { border-left: 5px solid #e67e22; }

.final {
    border-left: 5px solid #f1c40f;
    background: rgba(241,196,15,0.1);
    font-weight: bold;
}

/* Final */
.final-arena {
    text-align: center;
    margin-top: 50px;
}

.final-arena .match {
    display: inline-block;
    font-size: 20px;
    padding: 25px 40px;
    box-shadow: 0 0 40px rgba(241,196,15,0.9);
}

</style>
</head>

<body>

<!-- 🎬 背景视频（一定要放这里） -->
<video class="bg-video" autoplay muted loop playsinline>
    <source src="storm.mp4" type="video/mp4">
</video>

<h1>🏆 BRISCOLA ARENA</h1>

<h2>Gironi</h2>
<div class="arena-section">
    <div class="match group">A1<div class="vs">VS</div>A2</div>
    <div class="match group">A3<div class="vs">VS</div>A4</div>

    <div class="match group">B1<div class="vs">VS</div>B2</div>
    <div class="match group">B3<div class="vs">VS</div>B4</div>

    <div class="match group">C1<div class="vs">VS</div>C2</div>
    <div class="match group">C3<div class="vs">VS</div>C4</div>

    <div class="match group">D1<div class="vs">VS</div>D2</div>
    <div class="match group">D3<div class="vs">VS</div>D4</div>
</div>

<h2>Quarti di Finale</h2>
<div class="arena-section">
    <div class="match quarter">1A<div class="vs">VS</div>2B</div>
    <div class="match quarter">1B<div class="vs">VS</div>2A</div>
    <div class="match quarter">1C<div class="vs">VS</div>2D</div>
    <div class="match quarter">1D<div class="vs">VS</div>2C</div>
</div>

<h2>Semifinali</h2>
<div class="arena-section">
    <div class="match semi">Vincente Q1<div class="vs">VS</div>Vincente Q3</div>
    <div class="match semi">Vincente Q2<div class="vs">VS</div>Vincente Q4</div>
</div>

<div class="final-arena">
    <h2>FINAL ARENA</h2>
    <div class="match final">
        🏆 Vincente S1
        <div class="vs">VS</div>
        Vincente S2
    </div>
</div>

</body>
</html>
